services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: chatroom-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - chatroom
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: chatroom-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - chatroom
    depends_on:
      - app

  db:
    image: mariadb:11
    container_name: chatroom-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - chatroom
    command: --innodb-buffer-pool-size=128M
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  reverb:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: chatroom-reverb
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www/html
    networks:
      - chatroom
    depends_on:
      - app

networks:
  chatroom:
    driver: bridge

volumes:
  dbdata:
